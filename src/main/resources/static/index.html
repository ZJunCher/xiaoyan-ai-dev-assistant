<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能效研AI研发助手</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.27/dist/vue.global.prod.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #172033;
        }
        #app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 320px 1fr;
        }
        aside {
            background: #fff;
            border-right: 1px solid #dde3ee;
            padding: 20px;
            overflow-y: auto;
        }
        main {
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        header {
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #dde3ee;
            background: #fff;
        }
        h1 { margin: 0; font-size: 20px; }
        h2 { margin: 22px 0 10px; font-size: 15px; }
        button {
            border: 0;
            border-radius: 6px;
            padding: 9px 12px;
            background: #2454d6;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        button.secondary { background: #edf1f7; color: #24324a; }
        button.danger { background: #d83a3a; }
        button:disabled { opacity: .55; cursor: not-allowed; }
        input, textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px 11px;
            font: inherit;
            background: #fff;
        }
        textarea {
            min-height: 84px;
            resize: vertical;
        }
        .panel {
            border: 1px solid #dde3ee;
            border-radius: 8px;
            padding: 12px;
            background: #fbfcff;
            margin-bottom: 12px;
        }
        .row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .muted {
            color: #69758a;
            font-size: 12px;
        }
        .doc {
            padding: 10px 0;
            border-bottom: 1px solid #e6ebf3;
        }
        .doc:last-child { border-bottom: 0; }
        .doc-name {
            font-size: 13px;
            font-weight: 700;
            word-break: break-all;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .message {
            max-width: 880px;
            margin: 0 auto 16px;
            display: flex;
        }
        .message.user { justify-content: flex-end; }
        .bubble {
            max-width: min(760px, 86vw);
            padding: 13px 15px;
            border-radius: 8px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .assistant .bubble {
            background: #fff;
            border: 1px solid #dfe6f0;
        }
        .user .bubble {
            background: #2454d6;
            color: #fff;
        }
        footer {
            border-top: 1px solid #dde3ee;
            padding: 16px 24px;
            background: #fff;
        }
        .composer {
            max-width: 920px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: end;
        }
        .status {
            min-height: 20px;
            margin-top: 8px;
            color: #5f6e84;
            font-size: 12px;
        }
        @media (max-width: 880px) {
            #app { grid-template-columns: 1fr; }
            aside {
                max-height: 42vh;
                border-right: 0;
                border-bottom: 1px solid #dde3ee;
            }
            .composer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="app">
    <aside>
        <h1>智能效研AI研发助手</h1>
        <div class="muted">面向团队研发文档、开发规范、新人培训和常见问题的智能知识库。</div>

        <h2>当前用户</h2>
        <div class="panel">
            <input v-model="userId" @change="saveUserId" placeholder="例如：zhangsan">
            <div class="status">长期记忆按用户 ID 隔离；不填写时使用 default。</div>
        </div>

        <h2>文档上传</h2>
        <div class="panel">
            <input type="file" ref="fileInput" accept=".pdf,.doc,.docx,.md,.txt,.ppt,.pptx,.xls,.xlsx">
            <div class="row" style="margin-top:10px">
                <button @click="uploadDocument" :disabled="uploading">{{ uploading ? '入库中' : '上传入库' }}</button>
                <button class="secondary" @click="loadDocuments">刷新</button>
            </div>
            <div class="status">{{ uploadStatus }}</div>
        </div>

        <h2>长期记忆</h2>
        <div class="panel">
            <input v-model="memoryTitle" placeholder="标题">
            <textarea v-model="memoryContent" placeholder="需要助手长期记住的个人偏好、固定背景或团队事实" style="margin-top:8px"></textarea>
            <input v-model="memoryTags" placeholder="标签，可选" style="margin-top:8px">
            <button style="margin-top:10px" @click="addMemory" :disabled="!memoryContent.trim()">保存记忆</button>
            <div class="status">{{ memoryStatus }}</div>
        </div>

        <h2>文档列表</h2>
        <div class="panel">
            <div v-if="documents.length === 0" class="muted">暂无文档</div>
            <div v-for="doc in documents" :key="doc.id" class="doc">
                <div class="doc-name">{{ doc.fileName }}</div>
                <div class="muted">{{ doc.status }} · {{ doc.chunkCount }} chunks</div>
                <button class="danger" style="margin-top:8px" @click="deleteDocument(doc.id)">删除</button>
            </div>
        </div>
    </aside>

    <main>
        <header>
            <h1>智能效研AI研发助手</h1>
            <button class="secondary" @click="newSession">新会话</button>
        </header>

        <section class="chat" ref="chatBox">
            <div v-for="(msg, index) in messages" :key="index" :class="['message', msg.role]">
                <div class="bubble">{{ msg.content }}</div>
            </div>
        </section>

        <footer>
            <div class="composer">
                <textarea v-model="input" @keydown.enter.exact.prevent="send" placeholder="询问项目文档、开发规范、部署流程、新人培训问题..."></textarea>
                <button @click="send" :disabled="loading || !input.trim()">发送</button>
                <button class="secondary" @click="stop" :disabled="!loading">停止</button>
            </div>
            <div class="composer">
                <div class="status">{{ chatStatus }}</div>
            </div>
        </footer>
    </main>
</div>

<script>
const { createApp, ref, nextTick, onMounted } = Vue;

createApp({
    setup() {
        const sessionId = ref(String(Date.now()));
        const userId = ref(localStorage.getItem('xiaoyanUserId') || 'default');
        const messages = ref([{ role: 'assistant', content: '你好，我是智能效研AI研发助手。你可以上传团队文档，也可以直接询问项目资料、研发规范和新人培训问题。' }]);
        const input = ref('');
        const loading = ref(false);
        const uploading = ref(false);
        const chatStatus = ref('');
        const uploadStatus = ref('');
        const memoryStatus = ref('');
        const documents = ref([]);
        const memoryTitle = ref('');
        const memoryContent = ref('');
        const memoryTags = ref('');
        const fileInput = ref(null);
        const chatBox = ref(null);
        let controller = null;

        const currentUserId = () => userId.value.trim() || 'default';

        const saveUserId = () => {
            userId.value = currentUserId();
            localStorage.setItem('xiaoyanUserId', userId.value);
        };

        const scrollBottom = () => nextTick(() => {
            if (chatBox.value) chatBox.value.scrollTop = chatBox.value.scrollHeight;
        });

        const newSession = () => {
            sessionId.value = String(Date.now());
            messages.value = [{ role: 'assistant', content: '已开启新会话。' }];
            chatStatus.value = '';
            scrollBottom();
        };

        const send = async () => {
            if (!input.value.trim() || loading.value) return;
            saveUserId();
            const userText = input.value.trim();
            messages.value.push({ role: 'user', content: userText });
            const assistant = { role: 'assistant', content: '' };
            messages.value.push(assistant);
            input.value = '';
            loading.value = true;
            chatStatus.value = '正在检索知识库并生成回答...';
            controller = new AbortController();
            scrollBottom();

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId(), sessionId: sessionId.value, message: userText }),
                    signal: controller.signal
                });
                if (!response.ok) throw new Error(await response.text());

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    assistant.content += decoder.decode(value, { stream: true })
                        .replace(/^data:/gm, '')
                        .replace(/\n\n/g, '');
                    scrollBottom();
                }
                chatStatus.value = '';
            } catch (error) {
                if (error.name !== 'AbortError') {
                    assistant.content = '请求失败：' + error.message;
                }
                chatStatus.value = '';
            } finally {
                loading.value = false;
                controller = null;
            }
        };

        const stop = () => {
            if (controller) controller.abort();
        };

        const uploadDocument = async () => {
            const file = fileInput.value?.files?.[0];
            if (!file) {
                uploadStatus.value = '请选择文档';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            uploadStatus.value = '正在解析、分块并写入知识库...';
            uploading.value = true;

            try {
                const response = await fetch('/api/documents', { method: 'POST', body: formData });
                if (!response.ok) throw new Error(await response.text());
                const result = await response.json();
                uploadStatus.value = `入库完成：${result.chunkCount} 个片段`;
                fileInput.value.value = '';
                await loadDocuments();
            } catch (error) {
                uploadStatus.value = '上传失败：' + error.message;
            } finally {
                uploading.value = false;
            }
        };

        const loadDocuments = async () => {
            const response = await fetch('/api/documents');
            if (response.ok) documents.value = await response.json();
        };

        const deleteDocument = async (id) => {
            await fetch(`/api/documents/${id}`, { method: 'DELETE' });
            await loadDocuments();
        };

        const addMemory = async () => {
            saveUserId();
            memoryStatus.value = '正在保存长期记忆...';
            try {
                const response = await fetch('/api/memories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUserId(),
                        title: memoryTitle.value,
                        content: memoryContent.value,
                        tags: memoryTags.value
                    })
                });
                if (!response.ok) throw new Error(await response.text());
                memoryTitle.value = '';
                memoryContent.value = '';
                memoryTags.value = '';
                memoryStatus.value = '已保存';
            } catch (error) {
                memoryStatus.value = '保存失败：' + error.message;
            }
        };

        onMounted(() => {
            saveUserId();
            loadDocuments();
        });

        return {
            userId, sessionId, messages, input, loading, uploading, chatStatus, uploadStatus, memoryStatus,
            documents, memoryTitle, memoryContent, memoryTags, fileInput, chatBox,
            saveUserId, newSession, send, stop, uploadDocument, loadDocuments, deleteDocument, addMemory
        };
    }
}).mount('#app');
</script>
</body>
</html>
